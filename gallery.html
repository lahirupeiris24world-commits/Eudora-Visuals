<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Eudora Visuals</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark">
    <!-- Navigation -->
    <nav id="navbar">
        <div class="nav-container">
            <a href="index.html#home" class="logo">
                <img src="images/logo.png" alt="Eudora Visuals Logo" class="logo-img logo-shadow">
            </a>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Gallery Hero Section -->
    <section id="gallery-hero" class="hero" style="height: 60vh; min-height: 400px;">
        <div class="slider-container" id="gallery-slider">
            <!-- Slides will be injected here via JS -->
        </div>

        <!-- Slider Controls -->
        <div class="slider-controls">
            <button class="slider-arrow prev-arrow"><i class="fas fa-chevron-left"></i></button>
            <button class="slider-arrow next-arrow"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="slider-dots" id="gallery-slider-dots">
            <!-- Dots will be injected here via JS -->
        </div>
    </section>

    <!-- Main Gallery Section -->
    <section id="gallery" class="gallery section-padding">
        <div class="container">
            <!-- Filter Buttons -->
            <div class="filter-btns" id="filter-container">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="visiting-card">Visiting Cards</button>
                <button class="filter-btn" data-filter="logo">Logo Design</button>
                <button class="filter-btn" data-filter="digital-art">Digital Art</button>
                <button class="filter-btn" data-filter="flyer">Flyer</button>
                <button class="filter-btn" data-filter="video">Video Editing</button>
            </div>

            <!-- Gallery Grid -->
            <div class="gallery-grid" id="gallery-container">
                <!-- Gallery items will be injected here via JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <img src="images/logo.png" alt="Eudora Visuals Logo" class="footer-logo-img logo-shadow">
                    <p>Creative Graphic Design & Video Editing</p>
                </div>
                <div class="footer-contact">
                    <p><i class="fas fa-phone-alt"></i> 075 816 2206 (Lahiru)</p>
                    <p><i class="fas fa-envelope"></i> eudoravisuals@gmail.com</p>
                </div>
                <div class="social-links">
                    <a href="#" target="_blank"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="#" target="_blank"><i class="fab fa-youtube"></i></a>
                    <a href="#" target="_blank"><i class="fab fa-behance"></i></a>
                </div>
            </div>
            <div class="copyright">
                <p>&copy; 2026 Eudora Visuals. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <!-- WhatsApp Floating Icon -->
    <a href="https://wa.me/94758162206" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
