<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer Design | Eudora Visuals</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <nav id="navbar" class="scrolled">
        <div class="nav-container">
            <a href="index.html#home" class="logo logo-box">
                <img src="images/logo.png" alt="Eudora Visuals Logo" class="logo-img logo-shadow">
            </a>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="hamburger">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Project Detail Section -->
    <section class="project-detail section-padding">
        <div class="container">
            <div id="project-content">
                <div class="text-center">
                    <p>Loading flyer design...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <img src="images/logo.png" alt="Eudora Visuals Logo" class="footer-logo-img logo-shadow">
                    <p>Creative Graphic Design & Video Editing</p>
                </div>
                <div class="footer-contact">
                    <p><i class="fas fa-phone-alt"></i> 075 816 2206 (Lahiru)</p>
                    <p><i class="fas fa-envelope"></i> eudoravisuals@gmail.com</p>
                </div>
                <div class="social-links">
                    <a href="#" target="_blank"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="#" target="_blank"><i class="fab fa-youtube"></i></a>
                    <a href="#" target="_blank"><i class="fab fa-behance"></i></a>
                </div>
            </div>
            <div class="copyright">
                <p>&copy; 2026 Eudora Visuals. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = parseInt(urlParams.get('id'));
            const projectContent = document.getElementById('project-content');

            if (projectId && typeof galleryData !== 'undefined') {
                const project = galleryData.find(item => item.id === projectId);
                
                if (project) {
                    document.title = `${project.title} | Flyer Design | Eudora Visuals`;
                    projectContent.innerHTML = `
                        <div class="project-header text-center mb-60">
                            <span class="category-tag">${project.category}</span>
                            <h1 class="title">${project.title}</h1>
                            <div class="line mx-auto"></div>
                        </div>
                        <div class="project-main-content">
                            <div class="project-image-full watermark-container" oncontextmenu="return false;">
                                <img src="${project.image}" alt="${project.title}" class="w-100 rounded-20 shadow-lg" draggable="false">
                                <div class="protection-overlay"></div>
                                <img src="images/logo.png" alt="Watermark" class="project-watermark">
                            </div>
                            <div class="project-description mt-40">
                                <h2>About this Flyer</h2>
                                <p>${project.description}</p>
                                <p>This flyer was designed to capture attention and deliver information clearly and effectively. We focus on high-impact visuals and clean typography to ensure your message reaches your target audience.</p>
                            </div>
                        </div>
                        <div class="project-footer mt-60">
                            <a href="gallery.html" class="btn btn-outline">Back to Gallery</a>
                            <a href="index.html#contact" class="btn btn-primary">Start a Similar Project</a>
                        </div>
                        ${renderProjectNav(projectId)}
                    `;
                } else {
                    projectContent.innerHTML = `
                        <div class="text-center">
                            <h2>Flyer Project Not Found</h2>
                            <p>Sorry, the project you are looking for does not exist.</p>
                            <a href="gallery.html" class="btn btn-primary mt-20">Back to Gallery</a>
                        </div>
                    `;
                }
            }

            function renderProjectNav(currentId) {
                const currentIndex = galleryData.findIndex(item => item.id === currentId);
                const prevProject = galleryData[currentIndex - 1];
                const nextProject = galleryData[currentIndex + 1];

                let navHtml = '<div class="project-nav">';
                
                if (prevProject) {
                    const prevPage = prevProject.category === 'video' ? 'video-detail.html' : (prevProject.category === 'flyer' ? 'flyer-detail.html' : (prevProject.category === 'visiting-card' ? 'visiting-cards-detail.html' : 'project-detail.html'));
                    navHtml += `<a href="${prevPage}?id=${prevProject.id}" class="nav-btn prev"><i class="fas fa-arrow-left"></i> Previous Project</a>`;
                } else {
                    navHtml += '<div></div>';
                }

                if (nextProject) {
                    const nextPage = nextProject.category === 'video' ? 'video-detail.html' : (nextProject.category === 'flyer' ? 'flyer-detail.html' : (nextProject.category === 'visiting-card' ? 'visiting-cards-detail.html' : 'project-detail.html'));
                    navHtml += `<a href="${nextPage}?id=${nextProject.id}" class="nav-btn next">Next Project <i class="fas fa-arrow-right"></i></a>`;
                }

                navHtml += '</div>';
                return navHtml;
            }
        });
    </script>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/94758162206" class="whatsapp-float" target="_blank" title="Contact me on WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>
</body>
</html>
